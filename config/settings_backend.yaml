server:
  host: "0.0.0.0"
  port: 8000
  reload: true
  workers: 1

database:
  engine: "sqlite"
  path: "data/gia.db"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

mqtt:
  broker: ${MQTT_BROKER:-localhost}
  port: ${MQTT_PORT:-1883}
  topic_alertas: "gia/alertas"
  topic_notificaciones: "gia/notificaciones"
