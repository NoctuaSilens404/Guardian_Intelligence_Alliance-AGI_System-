<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIA - Login</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0a0e17;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: linear-gradient(135deg, #111827 0%, #1a2332 100%);
  border: 1px solid #1e3a5f;
  border-radius: 16px;
  padding: 48px 40px;
  width: 360px;
  text-align: center;
}
.login-box h1 {
  font-size: 18px;
  background: linear-gradient(90deg, #00d4ff, #0077b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.login-box p { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
.login-box input {
  width: 100%;
  padding: 12px 16px;
  background: #0d1b2a;
  border: 1px solid #1e3a5f;
  border-radius: 8px;
  color: #e0e0e0;
  font-size: 14px;
  outline: none;
  margin-bottom: 16px;
}
.login-box input:focus { border-color: #00d4ff; }
.login-box button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #00d4ff, #0077b6);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.login-box button:hover { opacity: 0.9; }
.error { color: #ff0044; font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="login-box">
  <h1>GUARDIAN INTELLIGENCE ALLIANCE</h1>
  <p>Panel de Monitoreo</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    <input type="password" name="password" placeholder="Contraseña" autofocus>
    <button type="submit">Ingresar</button>
  </form>
</div>
</body>
</html>
